<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vacek Performance — Coaching Platform (demo)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
    :root {
        --bg: #0a0b0a;
        --panel: #151816;
        --panel2: #1f2321;
        --border: #2b302d;
        --text: #f2f2f2;
        --muted: #838584;
        --accent: #BAF931;
        --accent-text: #0a0b0a;
        --accent-soft: rgba(186, 249, 49, 0.12);
        --green: #BAF931;
        --orange: #f59e0b;
        --red: #ef4444;
        --blue: #3b82f6;
        --radius: 12px;
        --font-head: 'Space Grotesk', Verdana, sans-serif;
        --font-body: 'Barlow', Tahoma, sans-serif;
        --font-cond: 'Barlow Condensed', 'Arial Narrow', sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        background: var(--bg);
        color: var(--text);
        font-family: var(--font-body);
        font-size: 15.5px;
        line-height: 1.5;
        min-height: 100vh;
    }
    h2, h3, .kpi .num, .hero h3, .logo { font-family: var(--font-head); }
    a { color: inherit; }

    /* ---------- top bar ---------- */
    .topbar {
        display: flex; align-items: center; gap: 16px;
        padding: 14px 22px;
        border-bottom: 1px solid var(--border);
        background: var(--panel);
        position: sticky; top: 0; z-index: 50;
    }
    .logo {
        display: flex; align-items: center; gap: 14px;
    }
    .logo img { height: 22px; display: block; }
    .logo small { display: block; font-weight: 500; color: var(--muted); font-size: 0.66rem; letter-spacing: 1.6px; text-transform: uppercase; font-family: var(--font-body); white-space: nowrap; }
    @media (max-width: 860px) { .logo small { display: none; } }
    .view-switch {
        margin-left: auto;
        display: flex; background: var(--panel2); border: 1px solid var(--border);
        border-radius: 999px; padding: 3px;
    }
    .view-switch button {
        border: 0; background: transparent; color: var(--muted);
        padding: 7px 18px; border-radius: 999px; cursor: pointer;
        font-size: 0.85rem; font-weight: 600; font-family: inherit;
    }
    .view-switch button.active { background: var(--accent); color: var(--accent-text); }
    .demo-badge {
        font-size: 0.68rem; font-weight: 700; letter-spacing: 1px;
        color: var(--orange); border: 1px solid var(--orange);
        padding: 2px 8px; border-radius: 999px; text-transform: uppercase;
        white-space: nowrap;
    }
    @media (max-width: 640px) { .demo-badge { display: none; } }

    .wrap { max-width: 1080px; margin: 0 auto; padding: 26px 22px 80px; }
    h2 { font-size: 1.15rem; margin-bottom: 14px; }
    h2 .sub { color: var(--muted); font-weight: 400; font-size: 0.85rem; margin-left: 8px; }

    /* ---------- KPI stat strip ---------- */
    .kpi-grid {
        display: grid; grid-template-columns: repeat(4, 1fr);
        border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
        margin-bottom: 30px;
    }
    .kpi { padding: 18px 22px; border-left: 1px solid var(--border); }
    .kpi:first-child { border-left: 0; padding-left: 2px; }
    .kpi .num { font-size: 2.1rem; font-weight: 700; letter-spacing: -0.02em; line-height: 1.1; font-variant-numeric: tabular-nums; }
    .kpi .lbl { color: var(--muted); font-size: 0.76rem; margin-top: 3px; font-family: var(--font-cond); font-weight: 600; text-transform: uppercase; letter-spacing: 1.6px; }
    .kpi.warn .num { color: var(--red); }
    .kpi.ok .num { color: var(--green); }

    /* ---------- interval profile (signature element) ---------- */
    .profile { display: flex; align-items: flex-end; gap: 2px; }
    .profile i { background: var(--accent); border-radius: 2px 2px 0 0; min-width: 3px; transform-origin: bottom; }
    .hero .profile { height: 58px; margin-top: 18px; max-width: 560px; }
    .hero .profile i { animation: rise 0.55s cubic-bezier(0.2, 0.7, 0.2, 1) backwards; }
    @keyframes rise { from { transform: scaleY(0); } }
    .wcard .profile { height: 20px; margin-top: 2px; }
    .modal .profile { height: 42px; margin: 14px 0 4px; }
    @media (prefers-reduced-motion: reduce) { .hero .profile i { animation: none; } }
    :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

    /* ---------- roster ---------- */
    .roster { display: flex; flex-direction: column; gap: 10px; }
    .athlete-row {
        display: grid;
        grid-template-columns: minmax(160px, 1.4fr) 1fr 1.2fr auto;
        gap: 14px; align-items: center;
        background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius);
        padding: 14px 18px; cursor: pointer; transition: border-color 0.15s;
    }
    .athlete-row:hover { border-color: var(--accent); }
    .a-name { font-weight: 700; }
    .a-name small { display: block; color: var(--muted); font-weight: 400; font-size: 0.75rem; }
    .a-week { font-size: 0.8rem; color: var(--muted); }
    .a-week b { color: var(--text); }
    .bar { height: 6px; background: var(--panel2); border-radius: 999px; overflow: hidden; margin-top: 6px; }
    .bar i { display: block; height: 100%; border-radius: 999px; background: var(--green); }
    .flags { display: flex; gap: 6px; justify-content: flex-end; flex-wrap: wrap; }
    .flag {
        font-size: 0.68rem; font-weight: 700; padding: 3px 9px; border-radius: 999px;
        white-space: nowrap;
    }
    .flag.red { background: rgba(239,68,68,0.14); color: var(--red); }
    .flag.orange { background: rgba(245,158,11,0.14); color: var(--orange); }
    .flag.green { background: var(--accent-soft); color: var(--green); }
    .flag.gray { background: var(--panel2); color: var(--muted); }

    /* ---------- week calendar ---------- */
    .back { background: none; border: 0; color: var(--muted); cursor: pointer; font-size: 0.85rem; padding: 0; margin-bottom: 14px; font-family: inherit; }
    .back:hover { color: var(--text); }
    .athlete-head { display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap; margin-bottom: 4px; }
    .athlete-head .meta { color: var(--muted); font-size: 0.8rem; }
    .week-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; margin-top: 16px; }
    .day-col .day-lbl { font-family: var(--font-cond); font-weight: 600; font-size: 0.76rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1.4px; margin-bottom: 6px; text-align: center; }
    .day-col .day-lbl b { display: block; color: var(--text); font-size: 0.85rem; }
    .day-col.today .day-lbl b { color: var(--accent); }
    .wcard {
        background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
        padding: 10px; font-size: 0.75rem; cursor: pointer; min-height: 86px;
        display: flex; flex-direction: column; gap: 4px; transition: border-color 0.15s;
    }
    .wcard:hover { border-color: var(--accent); }
    .wcard .wtitle { font-weight: 700; font-size: 0.78rem; line-height: 1.25; }
    .wcard .wdur { color: var(--muted); }
    .wcard.done { border-left: 3px solid var(--green); }
    .wcard.skipped { border-left: 3px solid var(--red); opacity: 0.75; }
    .wcard.synced { border-left: 3px solid var(--blue); }
    .wcard.planned { border-left: 3px solid var(--border); }
    .wcard.rest { opacity: 0.55; cursor: default; min-height: 60px; }
    .wstatus { font-size: 0.66rem; font-weight: 700; margin-top: auto; }
    .wstatus.done { color: var(--green); }
    .wstatus.skipped { color: var(--red); }
    .wstatus.synced { color: var(--blue); }
    .wstatus.planned { color: var(--muted); }
    .zbadges { display: flex; gap: 3px; flex-wrap: wrap; }
    .z {
        font-size: 0.62rem; font-weight: 800; padding: 1px 6px; border-radius: 4px;
    }
    .z.z1, .z.z2 { background: #202a10; color: var(--green); }
    .z.z3 { background: #2a2413; color: var(--orange); }
    .z.z4 { background: #2a1515; color: var(--red); }

    /* ---------- athlete (client) view ---------- */
    .hero {
        background: linear-gradient(135deg, var(--panel) 0%, var(--panel2) 100%);
        border: 1px solid var(--border); border-radius: var(--radius);
        padding: 24px; margin-bottom: 22px;
    }
    .hero .eyebrow { color: var(--accent); font-family: var(--font-cond); font-size: 0.82rem; font-weight: 700; letter-spacing: 2.2px; text-transform: uppercase; }
    .hero h3 { font-size: 1.9rem; letter-spacing: -0.02em; margin: 6px 0 4px; }
    .hero .desc { color: var(--muted); font-size: 0.88rem; max-width: 560px; }
    .steps { margin-top: 16px; display: flex; flex-direction: column; gap: 6px; }
    .step {
        display: flex; gap: 12px; align-items: center;
        background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
        padding: 9px 14px; font-size: 0.82rem;
    }
    .step .s-dur { color: var(--muted); min-width: 62px; font-variant-numeric: tabular-nums; }
    .garmin-btn {
        margin-top: 18px; display: inline-flex; align-items: center; gap: 8px;
        background: var(--accent); color: var(--accent-text); border: 0; border-radius: 999px;
        padding: 11px 22px; font-weight: 700; font-size: 0.88rem; cursor: pointer; font-family: inherit;
        letter-spacing: 0.2px;
    }
    .garmin-btn:hover { filter: brightness(1.08); }
    .garmin-btn.secondary { background: var(--panel2); border: 1px solid var(--border); color: var(--text); }
    .strip { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 6px; }
    .strip .wcard { min-width: 132px; flex-shrink: 0; }
    .result-row {
        display: grid; grid-template-columns: minmax(140px, 1.3fr) repeat(4, 1fr); gap: 10px;
        background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
        padding: 12px 16px; font-size: 0.82rem; align-items: center; margin-bottom: 8px;
    }
    .result-row .r-name { font-weight: 700; }
    .result-row .r-name small { display: block; color: var(--muted); font-weight: 400; }
    .result-row .r-metric b { display: block; font-size: 0.95rem; }
    .result-row .r-metric { color: var(--muted); font-size: 0.7rem; }

    /* ---------- compliance dots (vzor TP Home View) ---------- */
    .dots { display: flex; gap: 5px; margin-top: 7px; }
    .dot { width: 11px; height: 11px; border-radius: 999px; }
    .dot.green { background: var(--green); }
    .dot.yellow { background: var(--orange); opacity: 0.85; }
    .dot.orange { background: #f97316; }
    .dot.red { background: var(--red); }
    .dot.pending { background: transparent; border: 1.5px solid var(--border); }
    .dot.rest { width: 5px; height: 5px; margin: 3px 3px 0; background: var(--border); }

    /* ---------- coach layout + activity feed ---------- */
    .coach-cols { display: grid; grid-template-columns: 1.7fr 1fr; gap: 26px; align-items: start; }
    .feed { display: flex; flex-direction: column; gap: 8px; }
    .feed-item {
        background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
        padding: 11px 14px; font-size: 0.82rem; cursor: pointer; transition: border-color 0.15s;
        display: flex; gap: 10px;
    }
    .feed-item:hover { border-color: var(--accent); }
    .feed-item.unread { border-left: 3px solid var(--accent); }
    .avatar {
        flex-shrink: 0; width: 30px; height: 30px; border-radius: 999px;
        background: var(--panel2); border: 1px solid var(--border);
        display: flex; align-items: center; justify-content: center;
        font-family: var(--font-cond); font-weight: 600; font-size: 0.72rem; color: var(--muted);
    }
    .feed-item .fi-meta { color: var(--muted); font-size: 0.7rem; margin-top: 2px; }
    .feed-item .fi-text { color: var(--text); }
    .cbadge { font-size: 0.7rem; font-weight: 700; color: var(--accent); white-space: nowrap; }

    /* ---------- chat / poznámky k tréninku ---------- */
    .chat { display: flex; flex-direction: column; gap: 8px; margin-top: 14px; }
    .chat-title { font-family: var(--font-cond); font-weight: 600; font-size: 0.74rem; letter-spacing: 1.6px; text-transform: uppercase; color: var(--muted); }
    .bubble { max-width: 88%; padding: 9px 13px; border-radius: 12px; font-size: 0.85rem; line-height: 1.45; }
    .bubble .b-meta { font-size: 0.68rem; color: var(--muted); margin-top: 3px; }
    .bubble.a { align-self: flex-start; background: var(--panel2); border: 1px solid var(--border); border-bottom-left-radius: 3px; }
    .bubble.c { align-self: flex-end; background: rgba(186,249,49,0.1); border: 1px solid rgba(186,249,49,0.25); border-bottom-right-radius: 3px; }
    .chat-input { display: flex; gap: 8px; margin-top: 10px; }
    .chat-input textarea {
        flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 10px;
        color: var(--text); font-family: inherit; font-size: 0.85rem; padding: 9px 12px;
        resize: none; min-height: 40px;
    }
    .chat-input button {
        background: var(--accent); color: var(--accent-text); border: 0; border-radius: 999px;
        padding: 0 18px; font-weight: 700; cursor: pointer; font-family: inherit; font-size: 0.85rem;
    }

    /* ---------- subjektivní feedback (feel + RPE) ---------- */
    .fb-chips { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
    .fb-chip {
        display: inline-flex; align-items: center; gap: 6px;
        background: var(--panel2); border: 1px solid var(--border); border-radius: 999px;
        padding: 5px 13px; font-size: 0.8rem;
    }
    .fb-chip b { font-variant-numeric: tabular-nums; }
    .fbform { margin-top: 16px; border-top: 1px solid var(--border); padding-top: 16px; }
    .feel-row { display: flex; gap: 8px; margin: 10px 0 14px; }
    .feel-btn {
        flex: 1; max-width: 74px; background: var(--panel2); border: 1px solid var(--border);
        border-radius: 10px; padding: 9px 0 6px; cursor: pointer; text-align: center;
        font-size: 1.25rem; font-family: inherit; transition: border-color 0.15s;
    }
    .feel-btn small { display: block; font-size: 0.58rem; color: var(--muted); margin-top: 3px; font-family: var(--font-cond); letter-spacing: 0.6px; text-transform: uppercase; }
    .feel-btn.sel { border-color: var(--accent); background: var(--accent-soft); }
    .rpe-row { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }
    .rpe-row input[type=range] { flex: 1; accent-color: var(--accent); }
    .rpe-val { font-family: var(--font-head); font-weight: 700; font-size: 1.2rem; min-width: 58px; font-variant-numeric: tabular-nums; }

    /* ---------- wellness + load ---------- */
    .wellness {
        display: flex; gap: 0; border: 1px solid var(--border); border-radius: var(--radius);
        background: var(--panel); margin-top: 16px; overflow: hidden;
    }
    .wcell { flex: 1; padding: 12px 16px; border-left: 1px solid var(--border); }
    .wcell:first-child { border-left: 0; }
    .wcell b { display: block; font-family: var(--font-head); font-size: 1.15rem; font-variant-numeric: tabular-nums; }
    .wcell span { font-family: var(--font-cond); font-weight: 600; font-size: 0.66rem; letter-spacing: 1.2px; text-transform: uppercase; color: var(--muted); }
    .wcell.low b { color: var(--orange); }
    .loadbars { display: flex; align-items: flex-end; gap: 6px; height: 46px; }
    .loadbars i { flex: 1; background: var(--panel2); border: 1px solid var(--border); border-radius: 3px 3px 0 0; }
    .loadbars i.cur { background: var(--accent-soft); border-color: var(--accent); }
    .load-lbl { display: flex; gap: 6px; font-family: var(--font-cond); font-size: 0.64rem; color: var(--muted); letter-spacing: 0.8px; margin-top: 4px; }
    .load-lbl span { flex: 1; text-align: center; }

    /* ---------- privátní poznámka trenéra ---------- */
    .private-note {
        border: 1px dashed var(--border); border-radius: 10px; padding: 12px 15px;
        font-size: 0.84rem; color: var(--text); margin-top: 14px; background: rgba(255,255,255,0.015);
    }
    .private-note .pn-lbl { font-family: var(--font-cond); font-weight: 600; font-size: 0.68rem; letter-spacing: 1.4px; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }

    /* ---------- modal ---------- */
    .overlay {
        position: fixed; inset: 0; background: rgba(0,0,0,0.65);
        display: none; align-items: center; justify-content: center; z-index: 100; padding: 20px;
    }
    .overlay.open { display: flex; }
    .modal {
        background: var(--panel); border: 1px solid var(--border); border-radius: 16px;
        max-width: 520px; width: 100%; padding: 24px; max-height: 85vh; overflow-y: auto;
    }
    .modal h3 { margin-bottom: 2px; }
    .modal .m-meta { color: var(--muted); font-size: 0.8rem; margin-bottom: 14px; }
    .modal .close { float: right; background: none; border: 0; color: var(--muted); font-size: 1.3rem; cursor: pointer; font-family: inherit; }
    .actual-box {
        background: rgba(186,249,49,0.07); border: 1px solid rgba(186,249,49,0.3);
        border-radius: 10px; padding: 14px; margin-top: 14px; font-size: 0.85rem;
    }
    .actual-box h4 { color: var(--green); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
    .actual-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .actual-grid b { display: block; font-size: 1.05rem; }
    .actual-grid span { color: var(--muted); font-size: 0.7rem; }

    /* ---------- toast ---------- */
    .toast {
        position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
        background: var(--panel2); border: 1px solid var(--green); color: var(--text);
        padding: 12px 22px; border-radius: 10px; font-size: 0.85rem; font-weight: 600;
        opacity: 0; pointer-events: none; transition: all 0.25s; z-index: 200;
        box-shadow: 0 8px 30px rgba(0,0,0,0.5);
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .footer-note { margin-top: 40px; color: var(--muted); font-size: 0.72rem; text-align: center; }

    @media (max-width: 760px) {
        .kpi-grid { grid-template-columns: repeat(2, 1fr); }
        .kpi:nth-child(odd) { border-left: 0; padding-left: 2px; }
        .kpi:nth-child(n+3) { border-top: 1px solid var(--border); }
        .week-grid { grid-template-columns: repeat(2, 1fr); }
        .athlete-row { grid-template-columns: 1fr; gap: 8px; }
        .flags { justify-content: flex-start; }
        .result-row { grid-template-columns: 1fr 1fr; }
        .coach-cols { grid-template-columns: 1fr; }
        .wellness { flex-wrap: wrap; }
        .wcell { min-width: 40%; }
        .feel-btn { max-width: none; }
    }
</style>
</head>
<body>

<div class="topbar">
    <div class="logo">
        <img id="brandLogo" src="" alt="">
        <small id="brandTag"></small>
    </div>
    <span class="demo-badge">Demo · mock data</span>
    <div class="view-switch">
        <button id="btnCoach" onclick="setView('coach')">Trenér</button>
        <button id="btnAthlete" onclick="setView('athlete')">Atlet</button>
    </div>
</div>

<div class="wrap" id="app"></div>

<div class="overlay" id="overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal" id="modalBody"></div>
</div>
<div class="toast" id="toast"></div>

<script>
/* =========================================================
   WHITE-LABEL: celý brand platformy je jen konfigurace.
   Jiný kouč = jiný BRAND objekt (+ vlastní doména).
   ========================================================= */
const BRAND = {
    name: "Vacek Performance",
    tagline: "Train in Silence, Win in Public",
    logo: "assets/vp-logo.svg",
    accent: "#BAF931",
    accentText: "#0a0b0a"
};

const TODAY = "2026-07-03"; // fixní "dnes" pro deterministické demo
const DAYS = ["Po", "Út", "St", "Čt", "Pá", "So", "Ne"];
const WEEK = ["2026-06-29","2026-06-30","2026-07-01","2026-07-02","2026-07-03","2026-07-04","2026-07-05"];

/* ---------- mock tréninkové šablony (steps = co se pushne do Garminu) ---------- */
const T = {
    z2_90: { title: "Vytrvalost Z2", type: "bike", dur: "1:30", zones: ["z2"],
        desc: "Klidná souvislá jízda v Z2. Kadence 85–95, rovina/mírné kopce.",
        steps: [["Rozjetí", "10 min", "Z1"], ["Souvisle", "70 min", "Z2 · 85–95 rpm"], ["Vyjetí", "10 min", "Z1"]] },
    sst_75: { title: "Sweet Spot 3×10", type: "bike", dur: "1:15", zones: ["z3"],
        desc: "3× 10 min sweet spot (88–93 % FTP), mezi bloky 5 min Z1.",
        steps: [["Rozjetí", "15 min", "Z1–Z2"], ["3× 10 min", "30 min", "Sweet Spot · Z3"], ["Pauzy 3× 5 min", "15 min", "Z1"], ["Vyjetí", "15 min", "Z1"]] },
    vo2_60: { title: "VO2max 5×3", type: "bike", dur: "1:00", zones: ["z4"],
        desc: "5× 3 min Z4/VO2, mezi intervaly 3 min volně. Jen když je čerstvost.",
        steps: [["Rozjetí", "15 min", "Z1–Z2 + 3 sprinty"], ["5× 3 min", "15 min", "Z4"], ["Pauzy 5× 3 min", "15 min", "Z1"], ["Vyjetí", "15 min", "Z1"]] },
    long_180: { title: "Long ride", type: "bike", dur: "3:00", zones: ["z2","z3"],
        desc: "Dlouhá jízda Z2, posledních 30 min tempo Z3. Jíst každých 30 min.",
        steps: [["Rozjetí", "15 min", "Z1"], ["Souvisle", "135 min", "Z2"], ["Finále", "30 min", "Z3 tempo"]] },
    strength: { title: "Síla — core + nohy", type: "strength", dur: "40 min", zones: [],

/* ---------- helpers ---------- */
const fmtDate = d => d.slice(8,10).replace(/^0/,"") + "." + d.slice(5,7).replace(/^0/,"") + ".";

/* Interval profile: šířka bloku = podíl na čase, výška + sytost = zóna */
const Z_H = { 1: 32, 2: 50, 3: 70, 4: 92 };
const Z_O = { 1: 0.32, 2: 0.52, 3: 0.76, 4: 1 };
function zoneLevel(target) {
    const m = [...(target || "").matchAll(/Z(\d)/gi)].map(x => +x[1]);
    return m.length ? Math.max(...m) : 1;
}
function profileHTML(steps, animate) {
    if (!steps || !steps.length) return "";
    const mins = s => { const m = s[1].match(/(\d+)/); return m ? +m[1] : 5; };
    const total = steps.reduce((t, s) => t + mins(s), 0);
    return `<div class="profile" aria-hidden="true">` + steps.map((s, i) => {
        const z = zoneLevel(s[2]);
        return `<i style="width:${(100 * mins(s) / total).toFixed(1)}%;height:${Z_H[z]}%;opacity:${Z_O[z]}${animate ? `;animation-delay:${i * 90}ms` : ""}"></i>`;
    }).join("") + `</div>`;
}
const nonRest = a => a.week.filter(x => x.type !== "rest");
const doneCount = a => nonRest(a).filter(x => x.status === "done").length;
const pastPlanned = a => nonRest(a).filter(x => x.date <= TODAY && x.status !== "synced" || x.status === "done" || x.status === "skipped").filter(x => x.date <= TODAY).length;
function compliance(a) {
    const past = nonRest(a).filter(x => x.date < TODAY);
    if (!past.length) return 100;
    return Math.round(100 * past.filter(x => x.status === "done").length / past.length);
}
function flagsFor(a) {
    const f = [];
    const skips = a.week.filter(x => x.status === "skipped").length;
    if (skips >= 2) f.push(['red', skips + '× vynechaný trénink']);
    else if (skips === 1) f.push(['orange', '1× vynecháno']);
    if (a.lastSync.includes("⚠")) f.push(['red', 'bez syncu 6 dní']);
    a.week.forEach(x => {
        if (x.actual && x.actual.maxHr && x.actual.maxHr > a.hrMax * 0.97 && x.zones.includes("z4"))
            f.push(['orange', 'HR nad zónou (' + fmtDate(x.date) + ')']);
    });
    if (!f.length) f.push(['green', 'vše OK']);
    return f;
}
const STATUS_LBL = { done: "✅ Splněno", skipped: "✗ Vynecháno", synced: "⌚ V Garminu", planned: "· Naplánováno" };

/* Subjektivní zpětná vazba (vzor TrainingPeaks: 5 smajlíků + RPE 0-10) */
const FEEL = { 1: ["😫", "Velmi slabý"], 2: ["😕", "Slabý"], 3: ["😐", "Normální"], 4: ["🙂", "Silný"], 5: ["😄", "Velmi silný"] };

/* Compliance dle TrainingPeaks pravidel (plán vs. realita, primárně trvání):
   ±20 % zelená · 50-79 / 121-150 % žlutá · mimo ±50 % oranžová · nesplněno červená */
function parseMin(s) {
    if (!s) return 0;
    let m = s.match(/(\d+):(\d+):(\d+)/); if (m) return +m[1] * 60 + +m[2] + +m[3] / 60;
    m = s.match(/(\d+):(\d+)/); if (m) return +m[1] * 60 + +m[2];
    m = s.match(/(\d+)\s*min/); if (m) return +m[1];
    return 0;
}
function complianceOf(x) {
    if (x.type === "rest") return null;
    if (x.status === "skipped") return "red";
    if (x.status !== "done") return "pending";
    const plan = parseMin(x.dur);
    const real = x.actual ? parseMin(x.actual.time) : plan; // bez dat = splněno dle plánu
    if (!plan || !real) return "green";
    const pct = 100 * real / plan;
    if (pct >= 80 && pct <= 120) return "green";
    if ((pct >= 50 && pct < 80) || (pct > 120 && pct <= 150)) return "yellow";
    return "orange";
}
const commentCount = x => (x.comments || []).length;
const unreadOf = a => a.week.reduce((s, x) => s + (x.comments || []).filter(c => c.unread).length, 0);

/* Feed poslední aktivity napříč atlety (vzor TP Home View) */
function activityFeed() {
    const items = [];
    ATHLETES.forEach(a => a.week.forEach((x, i) => {
        (x.comments || []).forEach(c => { if (c.who === "a") items.push({ a, x, i, c }); });
    }));
    return items.sort((p, q) => (q.c.unread ? 1 : 0) - (p.c.unread ? 1 : 0));
}

            <div class="rpe-row">
                <input type="range" min="1" max="10" value="5" oninput="setRpe(this.value)">
                <span class="rpe-val" id="rpeVal">5/10</span>
            </div>
            <textarea id="fbNote" class="chat-input" style="width:100%;background:var(--bg);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:inherit;font-size:0.85rem;padding:9px 12px;resize:none" rows="2" placeholder="Poznámka pro trenéra (nepovinné)…"></textarea>
            <button class="garmin-btn" style="margin-top:12px" onclick="submitFeedback(${fbIdx})">Odeslat zpětnou vazbu</button>
        </div>
    </div>` : ""}
    <div class="hero" style="margin-top:22px">
        <div class="eyebrow">Dnes · pátek 3. 7.</div>
        <h3>${today.title} · ${today.dur}</h3>
        <div class="desc">${today.desc}</div>
        ${today.steps.length > 1 ? profileHTML(today.steps, true) : ""}
        ${today.steps.length ? `<div class="steps">${today.steps.map(s => `
            <div class="step"><span class="s-dur">${s[1]}</span><b>${s[0]}</b><span style="color:var(--muted);margin-left:auto">${s[2]}</span></div>`).join("")}</div>` : ""}
        <button class="garmin-btn" onclick="toast('Trénink je v Garmin Edge — stačí vyjet (demo)')">⌚ ${today.status === "synced" ? "V Garminu · připraveno" : "Odeslat do Garminu"}</button>
    </div>
    <h2>Zbytek týdne</h2>
    <div class="strip">
        ${upcoming.map(x => `
        <div class="wcard ${x.status}" style="cursor:default">
            <div class="wtitle">${fmtDate(x.date)} · ${x.title}</div>
            <div class="wdur">${x.dur}</div>
            ${x.steps.length ? profileHTML(x.steps) : `<div class="zbadges">${x.zones.map(z => `<span class="z ${z}">${z.toUpperCase()}</span>`).join("")}</div>`}
            <div class="wstatus ${x.status}">${STATUS_LBL[x.status]}</div>
        </div>`).join("")}
    </div>
    <h2 style="margin-top:26px">Moje výsledky <span class="sub">automaticky z Garminu</span></h2>
    ${results.map(x => `
    <div class="result-row" style="cursor:pointer" onclick="openWorkout(${a.id},${a.week.indexOf(x)})">
        <div class="r-name">${x.title}${x.feel ? " " + FEEL[x.feel][0] : ""}<small>${fmtDate(x.date)} · ${x.actual.time}${x.rpe ? ` · RPE ${x.rpe}` : ""}${commentCount(x) ? ` · 💬${commentCount(x)}` : ""}</small></div>
        <div class="r-metric"><b>${x.actual.km} km</b>vzdálenost</div>
        <div class="r-metric"><b>${x.actual.avgHr}</b>avg HR</div>
        <div class="r-metric"><b>${x.actual.elev} m</b>převýšení</div>
        <div class="r-metric"><b>${x.actual.te}</b>Training Effect</div>
    </div>`).join("")}
    <div class="footer-note">Žádné screenshoty. Dojedeš, Garmin se synchronizuje, trenér vidí výsledek i tvoji zpětnou vazbu.</div>`;
}

/* ---------- modal ---------- */
function openAthlete(id) { detailId = id; render(); }

function openWorkout(aid, idx) {
    const a = ATHLETES.find(x => x.id === aid);
    const x = a.week[idx];
    const body = document.getElementById("modalBody");
    body.innerHTML = `
    <button class="close" onclick="closeModal()">×</button>
    <h3>${x.title}</h3>
    <div class="m-meta">${a.name} · ${fmtDate(x.date)} · ${x.dur} · <span class="wstatus ${x.status}" style="display:inline">${STATUS_LBL[x.status]}</span></div>
    <p style="font-size:0.88rem; color:var(--muted)">${x.desc}</p>
    ${x.steps.length > 1 ? profileHTML(x.steps) : ""}
    ${x.steps.length ? `<div class="steps">${x.steps.map(s => `
        <div class="step"><span class="s-dur">${s[1]}</span><b>${s[0]}</b><span style="color:var(--muted);margin-left:auto">${s[2]}</span></div>`).join("")}</div>` : ""}
    ${x.note ? `<p style="margin-top:12px;font-size:0.82rem;color:var(--orange)">📝 ${x.note}</p>` : ""}
    ${x.actual ? `
    <div class="actual-box">
        <h4>Realita z Garminu</h4>
        <div class="actual-grid">
            <div><b>${x.actual.km} km</b><span>vzdálenost</span></div>
            <div><b>${x.actual.time}</b><span>čas</span></div>
            <div><b>${x.actual.elev} m</b><span>převýšení</span></div>
            <div><b>${x.actual.avgHr}</b><span>avg HR</span></div>
            <div><b>${x.actual.maxHr}</b><span>max HR</span></div>
            <div><b>${x.actual.te}</b><span>Training Effect</span></div>
        </div>
    </div>` : x.status !== "done" && x.type === "bike" ? `
    <button class="garmin-btn" style="margin-top:16px" onclick="toast('Strukturovaný trénink odeslán do Garmin Connect (demo)')">⌚ Odeslat do Garminu</button>` : ""}
    ${x.status === "done" && (x.feel || x.rpe) ? `
    <div class="fb-chips">
        ${x.feel ? `<span class="fb-chip">${FEEL[x.feel][0]} Pocit: <b>${FEEL[x.feel][1]}</b></span>` : ""}
        ${x.rpe ? `<span class="fb-chip">RPE <b>${x.rpe}/10</b></span>` : ""}
    </div>` : ""}
    <div class="chat">
        <div class="chat-title">Poznámky k tréninku</div>
        ${(x.comments || []).map(c => `
        <div class="bubble ${c.who}">${c.text}<div class="b-meta">${c.who === "c" ? "Karel (trenér)" : a.name.split(" ")[0]} · ${c.time}</div></div>`).join("")
        || `<div style="color:var(--muted);font-size:0.8rem">Zatím žádné poznámky.</div>`}
        <div class="chat-input">
            <textarea id="chatText" rows="1" placeholder="${view === 'coach' ? 'Napiš atletovi…' : 'Napiš trenérovi…'}"></textarea>
            <button onclick="sendComment(${aid},${idx})">Odeslat</button>
        </div>
    </div>`;
    (x.comments || []).forEach(c => delete c.unread);
    document.getElementById("overlay").classList.add("open");
}

function sendComment(aid, idx) {
    const el = document.getElementById("chatText");
    const text = el.value.trim();
    if (!text) return;
    const a = ATHLETES.find(x => x.id === aid);
    a.week[idx].comments.push({ who: view === "coach" ? "c" : "a", text, time: "právě teď" });
    openWorkout(aid, idx);
    toast(view === "coach" ? "Odesláno atletovi — dostane notifikaci" : "Odesláno trenérovi");
}
function closeModal() { document.getElementById("overlay").classList.remove("open"); render(); }

/* ---------- toast + brand init ---------- */
let toastTimer;
function toast(msg) {
    const t = document.getElementById("toast");
    t.textContent = "✓ " + msg;
    t.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove("show"), 2600);
}

document.documentElement.style.setProperty("--accent", BRAND.accent);
document.documentElement.style.setProperty("--accent-text", BRAND.accentText);
const logoEl = document.getElementById("brandLogo");
logoEl.src = BRAND.logo;
logoEl.alt = BRAND.name;
document.getElementById("brandTag").textContent = BRAND.tagline;
render();
</script>
</body>
</html>
